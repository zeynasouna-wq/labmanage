services:
  - type: web
    name: labmanage-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: |
      bash ./backend/build.sh
    startCommand: |
      cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: labmanage-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"

databases:
  - name: labmanage-db
    databaseName: labmanage
    user: postgres

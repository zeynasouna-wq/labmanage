services:
  - type: web
    name: labmanage-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install --prefer-binary -r backend/requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: labmanage-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "http://localhost:3000,http://localhost:8080,https://labmanage.onrender.com,https://labmanage.vercel.app"

databases:
  - name: labmanage-db
    databaseName: labmanage
    user: postgres
